name: Live Run Mode Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/live-run-mode-smoke.yml'
      - 'bin/openswarm'
      - 'openswarm.config.mjs'
      - 'package-lock.json'
      - 'package.json'
      - 'pyproject.toml'
      - 'scripts/extract-agentswarm-binaries.mjs'
      - 'scripts/platform-assets.mjs'
      - 'scripts/write-product-env.mjs'
      - 'scripts/smoke-run-mode.py'
      - 'swarm.py'
      - '*_agent/**'
      - 'data_analyst_agent/**'
      - 'deep_research/**'
      - 'orchestrator/**'
      - 'virtual_assistant/**'

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Load OpenSwarm product env
        run: node -e "const fs=require('fs');const cp=require('child_process');fs.appendFileSync(process.env.GITHUB_ENV,cp.execFileSync(process.execPath,['scripts/write-product-env.mjs'],{encoding:'utf8'}));"
      - name: Extract pinned AgentSwarm TUI
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').dependencies['@vrsen/agentswarm']")"
          node scripts/extract-agentswarm-binaries.mjs "$version" dist agentswarm-darwin-arm64
          echo "OPENSWARM_TUI_BINARY=$PWD/dist/agentswarm-darwin-arm64" >> "$GITHUB_ENV"
      - name: Verify OpenSwarm agent roster through TUI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/smoke-run-mode.py --source local --openswarm-tui-binary "$OPENSWARM_TUI_BINARY" --check agents
      - name: Verify live Agency Swarm Run-mode prompt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/smoke-run-mode.py --source local --openswarm-tui-binary "$OPENSWARM_TUI_BINARY" --check prompt
