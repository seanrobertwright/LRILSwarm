name: Live Run Mode Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/live-run-mode-smoke.yml'
      - 'bin/openswarm'
      - 'openswarm.config.mjs'
      - 'package-lock.json'
      - 'package.json'
      - 'pyproject.toml'
      - 'scripts/write-product-env.mjs'
      - 'scripts/smoke-run-mode.py'
      - 'swarm.py'
      - '*_agent/**'
      - 'data_analyst_agent/**'
      - 'deep_research/**'
      - 'orchestrator/**'
      - 'virtual_assistant/**'

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/checkout@v4
        with:
          repository: VRSEN/agentswarm-cli
          ref: v1.4.38
          path: agentswarm-cli
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Resolve OpenSwarm package version
        id: openswarm
        run: node -e "console.log('version=' + require('./package.json').version)" >> "$GITHUB_OUTPUT"
      - name: Load OpenSwarm product env
        env:
          OPENSWARM_PRODUCT_VERSION: ${{ steps.openswarm.outputs.version }}
        run: node -e "const fs=require('fs');const cp=require('child_process');fs.appendFileSync(process.env.GITHUB_ENV,cp.execFileSync(process.execPath,['scripts/write-product-env.mjs'],{encoding:'utf8'}));"
      - name: Build local OpenSwarm TUI
        shell: bash
        working-directory: agentswarm-cli
        env:
          OPENCODE_CHANNEL: rc
        run: |
          bun install
          cd packages/opencode
          bun run script/build.ts --single --skip-install
          binary="$(find dist -path '*/bin/agentswarm' -type f -perm -111 | head -n 1)"
          if [ -z "$binary" ]; then
            echo "FAILED: built agentswarm binary not found under agentswarm-cli/packages/opencode/dist" >&2
            find dist -maxdepth 4 -type f >&2
            exit 1
          fi
          echo "OPENSWARM_TUI_BINARY=$PWD/$binary" >> "$GITHUB_ENV"
      - name: Verify OpenSwarm agent roster through TUI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/smoke-run-mode.py --source local --openswarm-tui-binary "$OPENSWARM_TUI_BINARY" --check agents
      - name: Verify live Agency Swarm Run-mode prompt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/smoke-run-mode.py --source local --openswarm-tui-binary "$OPENSWARM_TUI_BINARY" --check prompt
